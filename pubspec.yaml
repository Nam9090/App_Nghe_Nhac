name: soundcloud_clone
description: A SoundCloud clone app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  provider: ^6.1.1
  file_picker: ^8.0.0  # Nâng cấp lên 8.0.0
  image_picker: ^1.0.5
  just_audio: ^0.9.36
  permission_handler: ^11.0.1
  intl: ^0.18.1
  flutter_slidable: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true